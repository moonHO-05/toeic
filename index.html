<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ETS 토익 단어장 · 900점 프로젝트</title>

  <!-- 모바일 앱(홈 화면 추가)용 설정 -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1226" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="영단" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="favicon-32.png" />

  <!-- 글꼴(온라인일 때 더 예쁘게) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app"></div>

  <!-- 효과음 → 데이터 → 앱 로직 -->
  <script src="sound.js"></script>
  <script src="words.js"></script>
  <script src="app.js"></script>

  <!-- 오프라인 지원(서비스워커) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
